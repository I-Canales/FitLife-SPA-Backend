spring.profiles.active=dev

spring.application.name=ms-reservas
server.port=8084

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

springdoc.swagger-ui.path=/swagger-ui.html

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n
logging.level.com.fitlife.fitlifespa=INFO

# URLs de los microservicios remotos que valida ms-reservas
ms-socios.url=${MS_SOCIOS_URL:http://localhost:8081}
ms-clases.url=${MS_CLASES_URL:http://localhost:8083}
