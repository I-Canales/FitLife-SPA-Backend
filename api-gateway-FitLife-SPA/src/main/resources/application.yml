server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
    
      discovery:
        locator:
          enabled: false

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:
        
        - id: ms-socios-auth
          uri: ${MS_SOCIOS_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: ms-socios-usuarios
          uri: ${MS_SOCIOS_URL:http://localhost:8081}
          predicates:
            - Path=/api/usuarios/**

        - id: ms-socios-membresias
          uri: ${MS_SOCIOS_URL:http://localhost:8081}
          predicates:
            - Path=/api/membresias/**

        - id: ms-socios-swagger
          uri: ${MS_SOCIOS_URL:http://localhost:8081}
          predicates:
            - Path=/socios/docs/**
          filters:
            - RewritePath=/socios/docs/(?<segment>.*), /$\{segment}

        
        - id: ms-entrenamientos-planes
          uri: ${MS_ENTRENAMIENTOS_URL:http://localhost:8082}
          predicates:
            - Path=/api/planes-entrenamiento/**

        - id: ms-entrenamientos-swagger
          uri: ${MS_ENTRENAMIENTOS_URL:http://localhost:8082}
          predicates:
            - Path=/entrenamientos/docs/**
          filters:
            - RewritePath=/entrenamientos/docs/(?<segment>.*), /$\{segment}

        
        - id: ms-clases
          uri: ${MS_CLASES_URL:http://localhost:8083}
          predicates:
            - Path=/api/clases/**

        
        - id: ms-reservas
          uri: ${MS_RESERVAS_URL:http://localhost:8084}
          predicates:
            - Path=/api/reservas/**


        - id: ms-pagos
          uri: ${MS_PAGOS_URL:http://localhost:8085}
          predicates:
            - Path=/api/pagos/**

        - id: ms-entrenadores
          uri: ${MS_ENTRENADORES_URL:http://localhost:8086}
          predicates:
            - Path=/api/entrenadores/**

        
        - id: ms-equipamiento
          uri: ${MS_EQUIPAMIENTO_URL:http://localhost:8087}
          predicates:
            - Path=/api/equipamiento/**


        - id: ms-notificaciones
          uri: ${MS_NOTIFICACIONES_URL:http://localhost:8088}
          predicates:
            - Path=/api/notificaciones/**


        - id: ms-asistencia
          uri: ${MS_ASISTENCIA_URL:http://localhost:8089}
          predicates:
            - Path=/api/asistencia/**


        - id: ms-progreso
          uri: ${MS_PROGRESO_URL:http://localhost:8090}
          predicates:
            - Path=/api/progreso/**

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.fitlife.gateway: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n"