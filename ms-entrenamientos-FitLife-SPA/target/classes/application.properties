spring.application.name=ms-entrenamientos
spring.profiles.active=dev

# Puerto del Microservicio de Entrenamientos
server.port=8082

# Configuracion de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracion de Flyway (Migraciones limpias)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Titulo para la documentacion Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# URL base de ms-socios para la comunicacion via WebClient (en Docker/Gateway se sobreescribe)
ms-socios.url=http://localhost:8081
ms-socios.timeout-ms=3000

# Logging estructurado con SLF4J
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n
logging.level.com.fitlife.fitlifespa=INFO
